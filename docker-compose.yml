services:
    postgres:
        image: postgres:17-alpine
        container_name: matching-man-db
        environment:
            POSTGRES_USER: admin
            POSTGRES_PASSWORD: password
            POSTGRES_DB: matching_hub
        ports: ["5432:5432"]
        volumes: [postgres_data:/var/lib/postgresql/data]
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U admin -d matching_hub"]
            interval: 5s
            timeout: 3s
            retries: 10
            start_period: 5s

    app:
        build: { context: ., dockerfile: Dockerfile }
        container_name: matching-man-app
        ports: ["3000:3000"]
        environment:
            DATABASE_URL: postgresql://admin:password@postgres:5432/matching_hub?schema=public
            NODE_ENV: production
            PORT: 3000
            DASHBOARD_ADMIN_TOKEN: dashboard-admin-token
            SESSION_SECRET: change-me-to-a-long-random-secret
        depends_on:
            postgres: { condition: service_healthy }
        restart: unless-stopped
        healthcheck:
            test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/health || exit 1"]
            interval: 10s
            timeout: 3s
            retries: 5
            start_period: 20s

volumes:
    postgres_data:
