name: CI/CD Pipeline

on:
    pull_request:
        branches:
            - main
    push:
        branches:
            - main

concurrency:
    group: pipeline-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
    contents: read
    packages: write

jobs:
    lint_test:
        name: Lint and Test
        runs-on: ubuntu-latest
        timeout-minutes: 20
        services:
            postgres:
                image: postgres:17-alpine
                env:
                    POSTGRES_USER: admin
                    POSTGRES_PASSWORD: password
                    POSTGRES_DB: matching_hub
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd "pg_isready -U admin -d matching_hub"
                    --health-interval 5s
                    --health-timeout 3s
                    --health-retries 20
        env:
            DATABASE_URL: postgresql://admin:password@127.0.0.1:5432/matching_hub?schema=public
            DATABASE_DIRECT_URL: postgresql://admin:password@127.0.0.1:5432/matching_hub?schema=public
            DASHBOARD_ADMIN_TOKEN: test-token
            SESSION_SECRET: test-secret-test-secret-test-secret
            NODE_ENV: test
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup pnpm
              uses: pnpm/action-setup@v6
              with:
                  version: 11.5.2

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version-file: ".node-version"
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Sync test database schema
              run: pnpm --filter api exec prisma migrate deploy

            - name: Lint
              run: pnpm lint

            - name: Build
              run: pnpm api:build

            - name: Run tests with coverage
              run: pnpm api:test:cov | tee coverage-output.txt

            - name: Publish coverage summary
              if: always()
              run: |
                  {
                    echo "## API test coverage"
                    echo '<details><summary>Full coverage report</summary>'
                    echo
                    echo '```'
                    cat coverage-output.txt
                    echo '```'
                    echo '</details>'
                  } >> "$GITHUB_STEP_SUMMARY"

            - name: Run e2e tests
              run: pnpm api:test:e2e

    db_migrate:
        name: Database Migration
        runs-on: ubuntu-latest
        needs: lint_test
        if: github.event_name == 'push'
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup pnpm
              uses: pnpm/action-setup@v6
              with:
                  version: 11.5.2

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version-file: ".node-version"
                  cache: "pnpm"

            - name: Install dependencies (Workspace Root)
              run: pnpm install --frozen-lockfile

            - name: Run Migrations (Production)
              env:
                  DATABASE_URL: ${{ secrets.DATABASE_URL }}
                  DATABASE_DIRECT_URL: ${{ secrets.DATABASE_DIRECT_URL }}
              run: pnpm --filter api exec prisma migrate deploy

    build_and_push:
        name: Build and Push Image (GHCR)
        runs-on: ubuntu-latest
        needs: db_migrate
        if: github.event_name == 'push'
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: ./Dockerfile
                  push: true
                  tags: |
                      ghcr.io/${{ github.repository }}:latest
                      ghcr.io/${{ github.repository }}:${{ github.sha }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    deploy_production:
        name: Deploy to Production (VPS)
        runs-on: ubuntu-latest
        needs: build_and_push
        if: github.event_name == 'push'
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Install cloudflared
              run: |
                  curl -fsSL https://pkg.cloudflare.com/cloudflare-main.gpg -o /usr/share/keyrings/cloudflare-main.gpg
                  echo "deb [signed-by=/usr/share/keyrings/cloudflare-main.gpg] https://pkg.cloudflare.com/cloudflared $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflared.list
                  sudo apt-get update -qq && sudo apt-get install -y cloudflared

            - name: Configure SSH over Cloudflare Access
              env:
                  CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
                  CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
              run: |
                  mkdir -p ~/.ssh
                  echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
                  chmod 600 ~/.ssh/deploy_key
                  cat >> ~/.ssh/config << EOF
                  Host vps-deploy
                    HostName ${{ secrets.VPS_SSH_HOSTNAME }}
                    User ${{ secrets.VPS_SSH_USER }}
                    IdentityFile ~/.ssh/deploy_key
                    StrictHostKeyChecking no
                    ProxyCommand cloudflared access ssh --hostname %h --service-token-id $CF_ACCESS_CLIENT_ID --service-token-secret $CF_ACCESS_CLIENT_SECRET
                  EOF

            - name: Copy production compose file to VPS
              run: scp docker-compose.prod.yml vps-deploy:/root/apps/matching-man/docker-compose.prod.yml

            - name: Pull and restart on VPS
              run: |
                  ssh vps-deploy "cd /root/apps/matching-man && \
                    echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u ${{ github.actor }} --password-stdin && \
                    docker compose -f docker-compose.prod.yml pull && \
                    docker compose -f docker-compose.prod.yml up -d && \
                    docker image prune -f"
