# Pings the API's /health endpoint on a schedule so the Render free-tier service
# doesn't go to sleep (it idles out after ~15 min). This shifts cold starts off
# the demo's critical path; it does NOT replace upgrading to an always-on plan.
#
# Set the repo variable KEEP_WARM_URL (Settings -> Secrets and variables ->
# Actions -> Variables) to your API health URL if it differs from the default.
# Note: GitHub schedules are best-effort and can be delayed several minutes, and
# scheduled workflows are auto-disabled after 60 days without repo activity.
name: keep-warm

on:
    schedule:
        - cron: "*/10 * * * *"
    workflow_dispatch: {}

jobs:
    ping:
        runs-on: ubuntu-latest
        steps:
            - name: Ping API health
              run: |
                  URL="${{ vars.KEEP_WARM_URL }}"
                  if [ -z "$URL" ]; then URL="https://matching-man-api.onrender.com/health"; fi
                  echo "Pinging $URL"
                  code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 90 "$URL" || true)
                  echo "HTTP status: $code"
                  if [ "$code" != "200" ]; then
                      echo "::warning::Health check returned $code (server may be cold-starting)"
                      exit 1
                  fi
