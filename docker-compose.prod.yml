services:
    app:
        image: ghcr.io/thanhnam2811/matching-man:latest
        container_name: matching-man-app
        ports: ["3000:3000"]
        env_file:
            - apps/api/.env.production
        environment:
            NODE_ENV: production
            PORT: 3000
        restart: unless-stopped
        healthcheck:
            test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/health || exit 1"]
            interval: 10s
            timeout: 3s
            retries: 5
            start_period: 20s
